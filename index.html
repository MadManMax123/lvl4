<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LEVEL 4 – NULL PRIME INTERFACE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="level4">
  <div class="l4-wrapper">
    <h1>NULL PRIME DECRYPTION INTERFACE</h1>

    <p class="l4-sub">
      well done making it this far.
    </p>
    <p class="l4-hint">
      these two primes will unlock NULL's next clue.
    </p>

    <div class="prime-box">
      <div class="prime-row">
        <span class="prime-label">p =</span>
        <span id="prime-p" class="prime-value">539447</span>
        <span id="status-p" class="prime-status"></span>
      </div>
      <div class="prime-row">
        <span class="prime-label">q =</span>
        <span id="prime-q" class="prime-value corrupted">UNKNOWN</span>
        <span id="status-q" class="prime-status"></span>
      </div>
    </div>

    <button id="decrypt-btn" class="decrypt-btn" type="button">
      DECRYPT
    </button>

    <div id="log-box" class="log-box"></div>

    <div class="product-box">
      <label for="product-input" class="product-label">
        enter <code>p × q</code> (decimal)
      </label>
      <div class="product-row">
        <input
          id="product-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          disabled
        />
        <button id="product-submit" type="button" disabled>
          submit
        </button>
      </div>
      <div id="product-feedback" class="product-feedback"></div>
    </div>

    <div id="flag-panel" class="flag-panel hidden">
      <p class="flag-label">LEVEL 4 FLAG</p>
      <div class="flag-box">
        FLAG{PRIMES_WERE_CORRUPTED}
      </div>
      <p class="flag-note">
        you repaired what NULL tried to break. the next node won’t be this forgiving.
      </p>
    </div>
  </div>

  <script>
    // simple SHA-256 via Web Crypto
    async function sha256(str) {
      const enc = new TextEncoder().encode(str);
      const buf = await crypto.subtle.digest("SHA-256", enc);
      const bytes = new Uint8Array(buf);
      return Array.from(bytes)
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const decryptBtn = document.getElementById("decrypt-btn");
      const logBox = document.getElementById("log-box");
      const statusP = document.getElementById("status-p");
      const statusQ = document.getElementById("status-q");
      const primeQ = document.getElementById("prime-q");

      const productInput = document.getElementById("product-input");
      const productSubmit = document.getElementById("product-submit");
      const productFeedback = document.getElementById("product-feedback");
      const flagPanel = document.getElementById("flag-panel");

      let nHashExpected = null;

      // load hashes from JSON
      try {
        const res = await fetch("/data/level4.json");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        nHashExpected = (data.n_sha256 || "").toLowerCase();
      } catch (err) {
        console.error("failed to load level4.json:", err);
        logBox.textContent = "CONFIG ERROR: unable to load hash data.";
        decryptBtn.disabled = true;
        productInput.disabled = true;
        productSubmit.disabled = true;
        return;
      }

      function appendLog(line, type = "info") {
        const el = document.createElement("div");
        el.className = "log-line log-" + type;
        el.textContent = line;
        logBox.appendChild(el);
        logBox.scrollTop = logBox.scrollHeight;
      }

      function runDecryptSequence() {
        decryptBtn.disabled = true;
        appendLog("[INIT] starting prime decryption sequence...");
        setTimeout(() => {
          appendLog("[INFO] reading prime p...");
        }, 600);

        setTimeout(() => {
          appendLog("[INFO] reading prime q...");
        }, 1300);

        setTimeout(() => {
          appendLog("[WARN] integrity mismatch detected for q.");
          primeQ.classList.add("glitching");
        }, 2100);

        setTimeout(() => {
          appendLog("[ERROR] entropy overflow. prime q marked as CORRUPTED.", "error");
          statusP.textContent = "[ OK ]";
          statusP.classList.add("status-ok");
          statusQ.textContent = "[ CORRUPTED ]";
          statusQ.classList.add("status-bad");
        }, 2900);

        setTimeout(() => {
          appendLog("[RECOVERY] searching backup nodes for intact q...");
        }, 3700);

        setTimeout(() => {
          appendLog("[RECOVERY] relay pointer: https://drive.google.com/YOUR_LEVEL5_LINK", "recovery");
          appendLog("[HINT] recover prime q from the backup relay, then return here.");
        }, 4600);

        setTimeout(() => {
          appendLog("[READY] product verification interface unlocked.");
          productInput.disabled = false;
          productSubmit.disabled = false;
        }, 5200);
      }

      async function checkProduct() {
        const raw = productInput.value.trim();

        if (!raw) {
          productFeedback.textContent = "input cannot be empty.";
          productFeedback.className = "product-feedback error";
          return;
        }
        if (!/^[0-9]+$/.test(raw)) {
          productFeedback.textContent = "only decimal digits are allowed.";
          productFeedback.className = "product-feedback error";
          return;
        }

        productInput.disabled = true;
        productSubmit.disabled = true;
        productFeedback.textContent = "verifying product...";
        productFeedback.className = "product-feedback";

        const hash = (await sha256(raw)).toLowerCase();

        if (hash === nHashExpected) {
          productFeedback.textContent = "correct product. access granted.";
          productFeedback.className = "product-feedback ok";
          flagPanel.classList.remove("hidden");
          flagPanel.classList.add("visible");
        } else {
          productFeedback.textContent =
            "incorrect product. this node rejects unstable keys.";
          productFeedback.className = "product-feedback error";
          productInput.disabled = false;
          productSubmit.disabled = false;
        }
      }

      decryptBtn.addEventListener("click", runDecryptSequence);
      productSubmit.addEventListener("click", checkProduct);
      productInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          checkProduct();
        }
      });
    });
  </script>
</body>
</html>
